# Nome logico dell'applicazione Spring Boot (usato in log/actuator e bootstrap contesto)
spring.application.name=springai-rag-assessment

# Porta HTTP esposta dal server embedded Tomcat (entry-point backend REST/UI)
server.port=8080

# Connessione PostgreSQL usata dai repository JPA (Macchinario, Assessment, Document, User)
spring.datasource.url=jdbc:postgresql://localhost:5432/ragassessment
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Strategia schema: "none" perché schema gestito esternamente/migrazioni SQL
spring.jpa.hibernate.ddl-auto=none
# Query SQL a log disabilitate di default per ridurre rumore
spring.jpa.show-sql=false
# Dialect PostgreSQL per generazione query Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Formattazione SQL utile quando show-sql è attivo
spring.jpa.properties.hibernate.format_sql=true

# Inizializza tabella/indice pgvector all'avvio (usato dal VectorStore Spring AI)
spring.ai.vectorstore.pgvector.initialize-schema=true
# Tipo indice ANN per ricerca semantica RAG
spring.ai.vectorstore.pgvector.index-type=HNSW
# Metrica distanza embedding usata nelle similarity search
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# Dimensione vettori embedding (deve combaciare col modello embedding scelto)
spring.ai.vectorstore.pgvector.dimensions=768

# Provider chat LLM principale (endpoint OpenAI-compatible, usato da Chatbot/Assessment services)
spring.ai.openai.api-key=sk-1gcRxla6khg1vlZ-ppmiIQ
spring.ai.openai.base-url=https://api.regolo.ai
# Modello chat impiegato per risposta chatbot, assessment e parsing explainable
spring.ai.openai.chat.options.model=Llama-3.3-70B-Instruct
# Temperatura media per bilanciare stabilità e variabilità testuale
spring.ai.openai.chat.options.temperature=0.7
# Limite massimo token risposta modello
spring.ai.openai.chat.options.max-tokens=4096

# Provider embedding locale (usato durante ingestione PDF in PdfIngestionService)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Disabilita uso chat via Ollama: la chat è servita dal provider OpenAI-compatible
spring.ai.ollama.chat.enabled=false

# Disabilita embeddings del provider chat remoto per evitare doppia sorgente embedding
spring.ai.openai.embedding.enabled=false

# Abilita multipart e limiti upload per endpoint manuale/documenti PDF
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Template engine usato dalle view web (`/login`, redirect root, pagine html)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Livelli log applicativi: debug su package core, info su security
logging.level.it.unicas.spring.springai=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.security=INFO

# Esegue script SQL di inizializzazione all'avvio
spring.sql.init.mode=always
